<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="20" x2="0" y2="83" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Trophy cup body -->
  <path d="M 30 20 H 70 V 48 C 70 60 60 65 50 65 C 40 65 30 60 30 48 Z" fill="url(#gold)"/>

  <!-- Left handle -->
  <path d="M 30 30 C 20 30 16 36 16 40 C 16 44 20 50 30 50"
        fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>

  <!-- Right handle -->
  <path d="M 70 30 C 80 30 84 36 84 40 C 84 44 80 50 70 50"
        fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>

  <!-- Stem -->
  <rect x="45" y="65" width="10" height="11" fill="url(#gold)"/>

  <!-- Base -->
  <rect x="35" y="76" width="30" height="7" rx="2" fill="url(#gold)"/>
</svg>
